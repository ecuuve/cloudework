<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout - COACHING</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --primary:#FF6B35; --dark:#1A1A2E; --dark-light:#16213E;
            --card-bg:rgba(255,255,255,0.05); --card-border:rgba(255,255,255,0.1);
            --success:#10b981; --text-muted:#94a3b8; --text-main:#e2e8f0;
        }
        body { font-family:'Work Sans',sans-serif; background:linear-gradient(135deg,var(--dark) 0%,var(--dark-light) 100%); min-height:100vh; color:var(--text-main); }
        
        .header { background:rgba(15,23,42,0.9); border-bottom:1px solid var(--card-border); padding:1rem 1.5rem; position:sticky; top:0; z-index:100; }
        .header-content { max-width:900px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; }
        .back-btn { background:none; border:1px solid var(--card-border); color:var(--text-muted); padding:0.5rem 1rem; border-radius:8px; cursor:pointer; text-decoration:none; font-size:0.85rem; }
        .back-btn:hover { border-color:var(--primary); color:var(--primary); }
        .workout-title { font-family:'Oswald',sans-serif; font-size:1.4rem; color:var(--primary); }
        
        .container { max-width:900px; margin:0 auto; padding:1.5rem; }
        
        .section-card { background:var(--card-bg); border:1px solid var(--card-border); border-radius:14px; padding:1.5rem; margin-bottom:1.5rem; }
        .section-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1rem; padding-bottom:1rem; border-bottom:1px solid var(--card-border); }
        .section-letter { width:45px; height:45px; border-radius:50%; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; font-family:'Oswald',sans-serif; font-size:1.4rem; font-weight:700; flex-shrink:0; }
        .section-info { flex:1; margin:0 1rem; }
        .section-name { font-family:'Oswald',sans-serif; font-size:1.2rem; margin-bottom:0.25rem; }
        .section-type { font-size:0.85rem; color:var(--text-muted); }
        .section-check { width:32px; height:32px; border:2px solid var(--card-border); border-radius:50%; cursor:pointer; transition:all 0.2s; position:relative; flex-shrink:0; }
        .section-check.checked { background:var(--success); border-color:var(--success); }
        .section-check.checked::after { content:'✓'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#fff; font-weight:700; font-size:1.1rem; }
        
        .section-badges { display:flex; gap:0.5rem; margin-bottom:0.75rem; }
        .badge { font-size:0.7rem; font-weight:600; padding:0.25rem 0.6rem; border-radius:12px; }
        .badge-benchmark { background:rgba(0,123,255,0.15); color:#007bff; }
        .badge-hero { background:rgba(220,53,69,0.15); color:#dc3545; }
        
        .timer-section { background:rgba(255,107,53,0.1); border:1px solid rgba(255,107,53,0.3); border-radius:10px; padding:1rem; margin-bottom:1rem; text-align:center; }
        .timer-display { font-family:'Oswald',sans-serif; font-size:2.5rem; color:var(--primary); margin-bottom:0.75rem; }
        .timer-buttons { display:flex; gap:0.75rem; justify-content:center; }
        .timer-btn { padding:0.6rem 1.2rem; border:none; border-radius:8px; font-weight:600; cursor:pointer; transition:all 0.2s; font-size:0.9rem; }
        .btn-start { background:var(--primary); color:#fff; }
        .btn-start:hover { background:#e05a24; }
        .btn-reset { background:var(--card-bg); color:var(--text-muted); border:1px solid var(--card-border); }
        .btn-reset:hover { border-color:var(--primary); color:var(--primary); }
        
        .section-content { color:var(--text-main); white-space:pre-wrap; line-height:1.7; margin-bottom:1rem; font-size:0.95rem; }
        
        .video-container { margin:1rem 0; }
        .video-btn { background:var(--primary); color:white; border:none; padding:0.6rem 1.2rem; border-radius:8px; cursor:pointer; font-size:0.9rem; transition:all 0.2s; }
        .video-btn:hover { background:#e05a24; }
        .video-embed { margin-top:1rem; border-radius:10px; overflow:hidden; }
        
        .results-box { background:rgba(0,0,0,0.2); border:1px solid var(--card-border); border-radius:10px; padding:1rem; margin-top:1rem; }
        .results-label { font-size:0.85rem; color:var(--text-muted); margin-bottom:0.5rem; font-weight:500; }
        .results-input { width:100%; background:rgba(0,0,0,0.3); border:1px solid var(--card-border); border-radius:8px; padding:0.75rem; color:var(--text-main); font-family:inherit; resize:vertical; min-height:60px; }
        .results-input:focus { outline:none; border-color:var(--primary); }
        
        .save-section-btn { width:100%; background:var(--primary); color:#fff; border:none; padding:0.9rem; border-radius:8px; font-size:1rem; font-weight:600; cursor:pointer; transition:all 0.2s; margin-top:1rem; }
        .save-section-btn:hover { background:#e05a24; }
        .save-section-btn.saved { background:var(--success); }
        
        .finish-btn { width:100%; background:var(--success); color:#fff; border:none; padding:1.2rem; border-radius:10px; font-size:1.1rem; font-weight:700; cursor:pointer; transition:all 0.2s; margin-top:2rem; }
        .finish-btn:hover { background:#0ea376; }
        
        .coach-notes { background:rgba(255,107,53,0.1); border:1px solid rgba(255,107,53,0.3); border-radius:10px; padding:1rem; margin-bottom:1.5rem; }
        .coach-notes-title { font-weight:600; margin-bottom:0.5rem; color:var(--primary); }
    </style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <a href="javascript:history.back()" class="back-btn">← Volver</a>
        <div class="workout-title" id="workoutTitle">Cargando...</div>
    </div>
</div>

<div class="container">
    <div id="coachNotesContainer"></div>
    <div id="sectionsContainer"></div>
</div>

<script>
const API_URL = 'http://localhost:8000/api/v1';
const authToken = localStorage.getItem('authToken');

if (!authToken) window.location.href = 'login-connected.html';

const urlParams = new URLSearchParams(window.location.search);
const assignmentId = urlParams.get('id');
const selectedDate = urlParams.get('date');

let workoutData = null;
let sectionTimers = {}; // { sectionIndex: { startTime, elapsed, interval } }
let sectionResults = {}; // { sectionIndex: { completed, time, result } }

const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];

loadWorkout();

async function loadWorkout() {
    try {
        const response = await fetch(`${API_URL}/my/assignments/${assignmentId}`, {
            headers: authHeaders()
        });
        
        const data = await response.json();
        
        if (data.success) {
            workoutData = data.data.assignment;
            
            // Cargar resultados guardados si existen
            await loadSavedResults();
            
            renderWorkout();
        } else {
            alert('Error al cargar el workout');
            history.back();
        }
    } catch (error) {
        console.error(error);
        alert('Error de conexión');
        history.back();
    }
}

async function loadSavedResults() {
    try {
        const response = await fetch(`${API_URL}/results?assignment_id=${assignmentId}`, {
            headers: authHeaders()
        });
        
        const data = await response.json();
        
        if (data.success && data.data.results && data.data.results.length > 0) {
            const savedResult = data.data.results[0];
            
            // Cargar section_results guardados
            if (savedResult.section_results) {
                Object.keys(savedResult.section_results).forEach(idx => {
                    const sectionData = savedResult.section_results[idx];
                    sectionResults[idx] = {
                        completed: sectionData.completed,
                        time_seconds: sectionData.time_seconds,
                        result: sectionData.result,
                        saved: true
                    };
                    
                    // Restaurar timer elapsed
                    if (sectionData.time_seconds > 0) {
                        sectionTimers[idx] = {
                            startTime: null,
                            elapsed: sectionData.time_seconds * 1000,
                            interval: null
                        };
                    }
                });
            }
        }
    } catch (error) {
        console.error('Error loading saved results:', error);
        // No hacer nada, continuar sin resultados guardados
    }
}

function renderWorkout() {
    const workout = workoutData.workout;
    
    document.getElementById('workoutTitle').textContent = workout.name;
    
    // Coach notes
    if (workout.description) {
        document.getElementById('coachNotesContainer').innerHTML = `
            <div class="coach-notes">
                <div class="coach-notes-title">📝 Notas del Coach:</div>
                <div style="white-space:pre-wrap;">${workout.description}</div>
            </div>
        `;
    }
    
    // Progress bar
    const sections = workout.sections || [];
    const completedCount = Object.keys(sectionResults).filter(k => sectionResults[k].saved).length;
    const totalCount = sections.length;
    const progressPercent = totalCount > 0 ? Math.round((completedCount / totalCount) * 100) : 0;
    
    const progressBarHtml = `
        <div style="background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
                <span style="font-weight:600;">Progreso de la Sesión</span>
                <span style="color:var(--primary);font-weight:700;">${completedCount}/${totalCount} secciones</span>
            </div>
            <div style="width:100%;height:12px;background:rgba(0,0,0,0.3);border-radius:6px;overflow:hidden;">
                <div style="width:${progressPercent}%;height:100%;background:linear-gradient(90deg,var(--primary),var(--success));transition:width 0.3s;"></div>
            </div>
        </div>
    `;
    
    document.getElementById('coachNotesContainer').insertAdjacentHTML('beforeend', progressBarHtml);
    
    // Sections
    const container = document.getElementById('sectionsContainer');
    
    container.innerHTML = sections.map((section, idx) => {
        const letter = letters[idx] || (idx + 1);
        const params = section.parameters || {};
        
        // Construir info de parámetros
        let paramsText = '';
        if (params.time_cap) paramsText += ` • Time Cap: ${params.time_cap} min`;
        if (params.rounds) paramsText += ` • ${params.rounds} rounds`;
        if (params.duration) paramsText += ` • ${params.duration} min`;
        if (params.sets) paramsText += ` • ${params.sets} sets`;
        if (params.reps) paramsText += ` • ${params.reps}`;
        if (params.work_sec && params.rest_sec) paramsText += ` • ${params.work_sec}seg/${params.rest_sec}seg`;
        
        // Datos guardados
        const savedData = sectionResults[idx] || {};
        const isSaved = savedData.saved || false;
        const savedResult = savedData.result || '';
        
        return `
            <div class="section-card">
                <div class="section-header">
                    <div class="section-letter">${letter}</div>
                    <div class="section-info">
                        <div class="section-name">${section.name || 'Sección ' + (idx + 1)}</div>
                        <div class="section-type">${section.section_type}${paramsText}</div>
                    </div>
                    <div class="section-check ${isSaved ? 'checked' : ''}" id="check-${idx}"></div>
                </div>
                
                ${section.is_benchmark || section.is_hero ? `
                    <div class="section-badges">
                        ${section.is_benchmark ? '<span class="badge badge-benchmark">📊 BENCHMARK</span>' : ''}
                        ${section.is_hero ? '<span class="badge badge-hero">🎖️ HERO WOD</span>' : ''}
                    </div>
                ` : ''}
                
                <div class="timer-section">
                    <div class="timer-display" id="timer-${idx}">00:00</div>
                    <div class="timer-buttons">
                        <button class="timer-btn btn-start" id="start-btn-${idx}" onclick="toggleTimer(${idx})">▶️ Iniciar</button>
                        <button class="timer-btn btn-reset" onclick="resetTimer(${idx})">🔄 Reset</button>
                    </div>
                </div>
                
                ${section.description ? `<div class="section-content">${section.description}</div>` : ''}
                
                ${section.video_url ? `
                    <div class="video-container">
                        <button class="video-btn" onclick="toggleVideo(${idx})">▶️ Ver video demo</button>
                        <div id="video-${idx}" style="display:none;" class="video-embed">
                            <iframe width="100%" height="350" src="${getEmbedUrl(section.video_url)}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        </div>
                    </div>
                ` : ''}
                
                <div class="results-box">
                    <div class="results-label">📊 Resultados</div>
                    <textarea class="results-input" id="result-${idx}" placeholder="Tiempo, reps, peso, notas..."
                              onchange="saveResultLocal(${idx}, this.value)">${savedResult}</textarea>
                </div>
                
                <button class="save-section-btn ${isSaved ? 'saved' : ''}" id="save-btn-${idx}" onclick="saveSection(${idx})">
                    ${isSaved ? 'Actualizar Sección' : '💾 Guardar Sección'}
                </button>
            </div>
        `;
    }).join('');
    
    // Actualizar displays de timer con valores guardados
    sections.forEach((section, idx) => {
        if (sectionTimers[idx] && sectionTimers[idx].elapsed > 0) {
            const totalSeconds = Math.floor(sectionTimers[idx].elapsed / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            const display = document.getElementById(`timer-${idx}`);
            if (display) {
                display.textContent = String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
            }
        }
    });
}

// TIMER POR SECCIÓN
function toggleTimer(idx) {
    if (!sectionTimers[idx]) {
        sectionTimers[idx] = { startTime: null, elapsed: 0, interval: null };
    }
    
    const timer = sectionTimers[idx];
    const btn = document.getElementById(`start-btn-${idx}`);
    
    if (timer.interval) {
        // Pausar
        clearInterval(timer.interval);
        timer.interval = null;
        btn.innerHTML = '▶️ Continuar';
    } else {
        // Iniciar/Continuar
        timer.startTime = Date.now() - timer.elapsed;
        timer.interval = setInterval(() => updateTimerDisplay(idx), 100);
        btn.innerHTML = '⏸️ Pausar';
    }
}

function resetTimer(idx) {
    if (sectionTimers[idx]) {
        clearInterval(sectionTimers[idx].interval);
        sectionTimers[idx] = { startTime: null, elapsed: 0, interval: null };
    }
    document.getElementById(`timer-${idx}`).textContent = '00:00';
    document.getElementById(`start-btn-${idx}`).innerHTML = '▶️ Iniciar';
}

function updateTimerDisplay(idx) {
    const timer = sectionTimers[idx];
    if (!timer || !timer.startTime) return;
    
    timer.elapsed = Date.now() - timer.startTime;
    const totalSeconds = Math.floor(timer.elapsed / 1000);
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    
    document.getElementById(`timer-${idx}`).textContent = 
        String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
}

function saveResultLocal(idx, value) {
    if (!sectionResults[idx]) sectionResults[idx] = {};
    sectionResults[idx].result = value;
    
    // Guardar tiempo del timer
    if (sectionTimers[idx]) {
        sectionResults[idx].time_seconds = Math.floor(sectionTimers[idx].elapsed / 1000);
    }
}

async function saveSection(idx) {
    // Pausar el timer si está corriendo
    if (sectionTimers[idx]?.interval) {
        toggleTimer(idx);
    }
    
    // Preparar datos de la sección
    const timeSeconds = sectionTimers[idx] ? Math.floor(sectionTimers[idx].elapsed / 1000) : 0;
    const result = document.getElementById(`result-${idx}`).value;
    
    const sectionData = {
        section_index: idx,
        time_seconds: timeSeconds,
        result: result || null,
        completed: true
    };
    
    try {
        const btn = document.getElementById(`save-btn-${idx}`);
        const check = document.getElementById(`check-${idx}`);
        
        btn.disabled = true;
        btn.textContent = 'Guardando...';
        
        const response = await fetch(`${API_URL}/results/section`, {
            method: 'POST',
            headers: {
                ...authHeaders(),
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                workout_assignment_id: assignmentId,
                section_data: sectionData
            })
        });
        
        const data = await response.json();
        
        if (data.success) {
            // Marcar como guardado
            btn.classList.add('saved');
            btn.textContent = 'Guardado';
            check.classList.add('checked');
            
            // Guardar en memoria local
            if (!sectionResults[idx]) sectionResults[idx] = {};
            sectionResults[idx].completed = true;
            sectionResults[idx].saved = true;
            
            // Actualizar progress bar
            updateProgressBar();
            
            // Verificar si todas las secciones están completadas
            await checkAutoComplete();
            
            setTimeout(() => {
                btn.disabled = false;
                btn.textContent = '💾 Actualizar Sección';
            }, 2000);
        } else {
            btn.disabled = false;
            btn.textContent = '💾 Guardar Sección';
            alert('Error: ' + (data.message || 'No se pudo guardar'));
        }
    } catch (error) {
        console.error(error);
        document.getElementById(`save-btn-${idx}`).disabled = false;
        document.getElementById(`save-btn-${idx}`).textContent = '💾 Guardar Sección';
        alert('Error de conexión');
    }
}

async function checkAutoComplete() {
    const totalSections = workoutData.workout.sections.length;
    const completedSections = Object.keys(sectionResults).filter(k => sectionResults[k].saved).length;
    
    if (completedSections === totalSections) {
        // Todas las secciones completadas - marcar workout como completado automáticamente
        try {
            const response = await fetch(`${API_URL}/results/complete`, {
                method: 'POST',
                headers: {
                    ...authHeaders(),
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    workout_assignment_id: assignmentId
                })
            });
            
            const data = await response.json();
            
            if (data.success) {
                // Mostrar mensaje de éxito
                const returnDate = selectedDate || new Date().toISOString().split('T')[0];
                
                if (confirm('✅ ¡Workout completado! ¿Volver al calendario?')) {
                    window.location.href = `athlete-day-view.html?date=${returnDate}`;
                }
            }
        } catch (error) {
            console.error('Error auto-completing workout:', error);
        }
    }
}

function updateProgressBar() {
    const totalSections = workoutData.workout.sections.length;
    const completedSections = Object.keys(sectionResults).filter(k => sectionResults[k].saved).length;
    const progressPercent = totalSections > 0 ? Math.round((completedSections / totalSections) * 100) : 0;
    
    const progressBar = document.querySelector('[style*="linear-gradient(90deg,var(--primary),var(--success))"]');
    const progressText = progressBar?.parentElement?.parentElement?.querySelector('[style*="font-weight:700"]');
    
    if (progressBar) {
        progressBar.style.width = progressPercent + '%';
    }
    if (progressText) {
        progressText.textContent = `${completedSections}/${totalSections} secciones`;
    }
}

function toggleVideo(idx) {
    const videoDiv = document.getElementById(`video-${idx}`);
    if (videoDiv.style.display === 'none') {
        videoDiv.style.display = 'block';
    } else {
        videoDiv.style.display = 'none';
    }
}

function getEmbedUrl(url) {
    if (url.includes('youtube.com') || url.includes('youtu.be')) {
        let videoId = '';
        if (url.includes('youtu.be/')) {
            videoId = url.split('youtu.be/')[1].split('?')[0];
        } else if (url.includes('youtube.com')) {
            const urlParams = new URLSearchParams(url.split('?')[1]);
            videoId = urlParams.get('v');
        }
        return `https://www.youtube.com/embed/${videoId}`;
    }
    if (url.includes('vimeo.com')) {
        const videoId = url.split('vimeo.com/')[1].split('?')[0];
        return `https://player.vimeo.com/video/${videoId}`;
    }
    return url;
}

function authHeaders() {
    return {
        'Authorization': `Bearer ${authToken}`,
        'Accept': 'application/json'
    };
}
</script>
</body>
</html>
