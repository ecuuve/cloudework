<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial del Workout | CloudeWork</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #1a1d29;
            --bg-secondary: #252936;
            --card-bg: #2d3142;
            --card-border: rgba(255,255,255,0.08);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --primary: #FF6B35;
            --success: #10b981;
            --info: #3b82f6;
            --warning: #f59e0b;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Work Sans',sans-serif; background:var(--bg-primary); color:var(--text-main); line-height:1.6; }
        
        .header { background:var(--bg-secondary); border-bottom:1px solid var(--card-border); padding:0.75rem 1.5rem; display:flex; justify-content:space-between; align-items:center; }
        .back-btn { background:none; border:1px solid rgba(255,255,255,0.1); color:var(--text-muted); padding:0.4rem 0.9rem; border-radius:8px; cursor:pointer; font-size:0.85rem; transition:all 0.2s; }
        .back-btn:hover { border-color:var(--primary); color:var(--primary); }
        
        .main { max-width:1200px; margin:1.5rem auto; padding:0 1.5rem; }
        .workout-title { font-size:1.75rem; font-weight:700; margin-bottom:0.4rem; font-family:'Oswald',sans-serif; }
        .workout-meta { display:flex; gap:1.5rem; margin-bottom:1rem; font-size:0.85rem; color:var(--text-muted); }
        
        .results-grid { display:grid; gap:0.75rem; }
        .result-card { background:var(--card-bg); border:1px solid var(--card-border); border-radius:10px; padding:1.2rem; transition:all 0.2s; cursor:pointer; }
        .result-card:hover { transform:translateY(-2px); border-color:rgba(255,107,53,0.3); }
        .result-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem; }
        .result-date { font-size:1rem; font-weight:600; }
        .result-time { font-size:1.3rem; font-weight:700; color:var(--primary); font-family:'Oswald',sans-serif; }
        .result-details { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:0.75rem; margin-top:0.75rem; }
        .detail-item { font-size:0.8rem; }
        .detail-label { color:var(--text-muted); margin-bottom:0.2rem; font-size:0.75rem; }
        .detail-value { font-weight:600; }
        
        .badge { padding:0.2rem 0.6rem; border-radius:5px; font-size:0.7rem; font-weight:600; }
        .badge-pr { background:rgba(16,185,129,0.15); color:var(--success); }
        .badge-rx { background:rgba(255,107,53,0.15); color:var(--primary); }
        
        .empty-state { text-align:center; padding:3rem 2rem; color:var(--text-muted); }
        .empty-icon { font-size:2.5rem; margin-bottom:0.75rem; }
        
        .loading { display:flex; justify-content:center; padding:3rem; }
        .loading-spinner { width:40px; height:40px; border:3px solid rgba(255,107,53,0.2); border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="history.back()">← Volver</button>
    <button class="back-btn" onclick="logout()">Cerrar sesión</button>
</div>

<main class="main">
    <div id="workoutInfo">
        <div class="loading"><div class="loading-spinner"></div></div>
    </div>
    
    <div id="resultsContainer">
        <div class="loading"><div class="loading-spinner"></div></div>
    </div>
</main>

<script>
const API_URL = 'http://localhost:8000/api';
const authToken = localStorage.getItem('authToken');

if (!authToken) {
    window.location.href = 'login-connected.html';
}

const urlParams = new URLSearchParams(window.location.search);
const workoutId = urlParams.get('workout_id');

if (!workoutId) {
    document.getElementById('workoutInfo').innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><p>No se especificó un workout</p></div>';
} else {
    loadWorkoutHistory();
}

async function loadWorkoutHistory() {
    try {
        const resultsRes = await fetch(`${API_URL}/v1/results?workout_id=${workoutId}`, {
            headers: authHeaders()
        });
        const resultsData = await resultsRes.json();
        
        if (resultsData.success && resultsData.data.results.length > 0) {
            const results = resultsData.data.results;
            const firstResult = results[0];
            const w = firstResult.workout;
            
            document.getElementById('workoutInfo').innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;">
                    <div style="flex:1;">
                        <h1 class="workout-title">${w.name}</h1>
                        <div class="workout-meta">
                            <span>📋 ${w.type || 'Custom'}</span>
                            <span>⚡ ${w.difficulty || 'Intermedia'}</span>
                        </div>
                    </div>
                    <button onclick="executeWorkoutAgain()" style="padding:0.75rem 1.5rem;background:var(--primary);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap;" onmouseover="this.style.background='#e05a24'" onmouseout="this.style.background='var(--primary)'">
                        ▶️ Ejecutar de nuevo
                    </button>
                </div>
                ${w.description ? `<div style="background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:1.25rem;margin-bottom:1.5rem;white-space:pre-wrap;line-height:1.8;color:var(--text-muted);">${w.description}</div>` : ''}
            `;
            
            document.getElementById('resultsContainer').innerHTML = `
                <h2 style="font-size:1.3rem;margin:1rem 0;font-family:'Oswald',sans-serif;">📊 Historial (${results.length})</h2>
                <div class="results-grid">
                    ${results.map(r => `
                        <div class="result-card" onclick="goToWorkoutDetail(${r.assignment_id})">
                            <div class="result-header">
                                <div>
                                    <div class="result-date">${formatDate(r.completed_at)}</div>
                                    <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.25rem;">${formatTime(r.completed_at)}</div>
                                </div>
                                <div class="result-time">${r.formatted_time || formatSeconds(r.time_seconds)}</div>
                            </div>
                            <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;">
                                ${r.is_pr ? '<span class="badge badge-pr">🏆 PR</span>' : ''}
                                ${r.rx_or_scaled === 'rx' ? '<span class="badge badge-rx">RX</span>' : '<span class="badge">Scaled</span>'}
                            </div>
                            ${r.notes ? `<div style="font-size:0.85rem;color:var(--text-muted);margin-top:0.5rem;">📝 ${r.notes}</div>` : ''}
                            <div class="result-details">
                                ${r.rounds_completed ? `<div class="detail-item"><div class="detail-label">Rondas</div><div class="detail-value">${r.rounds_completed}</div></div>` : ''}
                                ${r.reps_completed ? `<div class="detail-item"><div class="detail-label">Reps</div><div class="detail-value">${r.reps_completed}</div></div>` : ''}
                                ${r.feeling_rating ? `<div class="detail-item"><div class="detail-label">Sensación</div><div class="detail-value">${'⭐'.repeat(r.feeling_rating)}</div></div>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        } else {
            document.getElementById('workoutInfo').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📊</div>
                    <p>No se encontró información del workout</p>
                </div>
            `;
            document.getElementById('resultsContainer').innerHTML = '';
        }
        
    } catch(e) {
        console.error('Error cargando historial:', e);
        document.getElementById('workoutInfo').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">❌</div>
                <p>Error al cargar el historial</p>
            </div>
        `;
        document.getElementById('resultsContainer').innerHTML = '';
    }
}

function formatDate(dateStr) {
    if (!dateStr) return 'Sin fecha';
    const d = new Date(dateStr);
    return d.toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
}

function formatTime(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return d.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
}

function formatSeconds(seconds) {
    if (!seconds) return 'N/A';
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins}:${secs.toString().padStart(2,'0')}`;
}

function goToWorkoutDetail(assignmentId) {
    if (assignmentId) {
        window.location.href = `athlete-workout-view.html?id=${assignmentId}`;
    }
}

function executeWorkoutAgain() {
    // Crear un nuevo assignment para este workout
    fetch(`${API_URL}/v1/my/self-assign`, {
        method: 'POST',
        headers: {
            ...authHeaders(),
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            workout_id: workoutId,
            scheduled_date: new Date().toISOString().split('T')[0]
        })
    })
    .then(r => r.json())
    .then(data => {
        console.log('Self-assign response:', data);
        if (data.success && data.data.assignment) {
            // Ir directo al workout recién creado
            window.location.href = `athlete-workout-view.html?id=${data.data.assignment.id}&start=true`;
        } else {
            alert('Error al asignar el workout: ' + (data.message || 'Intenta de nuevo'));
        }
    })
    .catch(e => {
        console.error('Error:', e);
        alert('Error al preparar el workout: ' + e.message);
    });
}

function logout() {
    localStorage.removeItem('authToken');
    localStorage.removeItem('cloudework_user');
    window.location.href = 'login-connected.html';
}

function authHeaders() {
    return {
        'Authorization': `Bearer ${authToken}`,
        'Accept': 'application/json'
    };
}
</script>

</body>
</html>
